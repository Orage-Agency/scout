name: Deploy Edge Functions

on:
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy edge functions
        run: |
          supabase functions deploy generate-skill --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} --use-api
          supabase functions deploy transcribe     --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} --use-api
          supabase functions deploy coach          --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} --use-api
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

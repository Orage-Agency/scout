name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm typecheck

  smoke:
    name: Smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build with stub env values — the structural smoke tests don't call
      # Supabase, so the URL/key values don't matter as long as they're set.
      - name: Build extension
        run: pnpm build
        env:
          VITE_SUPABASE_URL: https://stub.supabase.co
          VITE_SUPABASE_ANON_KEY: stub-anon-key

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: Run smoke tests
        run: pnpm test:smoke
        env:
          VITE_SUPABASE_URL: https://stub.supabase.co
          VITE_SUPABASE_ANON_KEY: stub-anon-key

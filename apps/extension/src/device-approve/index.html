<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Approve Scout Desktop</title>
    <link rel="stylesheet" href="../popup/scout-simple.css" />
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; background: #0b0b0d; color: #f0f0f0; margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 24px; }
      .card { background: #15151a; border: 1px solid #26262d; border-radius: 12px; padding: 28px 30px; max-width: 440px; width: 100%; box-shadow: 0 30px 60px rgba(0,0,0,0.4); }
      h1 { margin: 0 0 8px; font-size: 18px; font-weight: 600; }
      p { color: #a0a0a8; font-size: 13px; line-height: 1.55; margin: 0 0 16px; }
      .code-input { width: 100%; padding: 14px 16px; background: #1f1f25; border: 1px solid #32323b; color: #fff; border-radius: 8px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 22px; letter-spacing: 0.18em; text-align: center; box-sizing: border-box; margin-bottom: 16px; text-transform: uppercase; }
      .code-input:focus { outline: 0; border-color: #6366f1; }
      .meta { background: #1f1f25; border-radius: 8px; padding: 12px 14px; margin-bottom: 16px; font-size: 12px; color: #c0c0c8; }
      .meta b { color: #fff; }
      .actions { display: flex; gap: 8px; }
      button { flex: 1; padding: 12px 16px; border: 0; border-radius: 8px; font-weight: 600; font-size: 14px; cursor: pointer; }
      button.primary { background: #6366f1; color: white; }
      button.primary:hover { background: #5258ee; }
      button.primary:disabled { opacity: 0.5; cursor: not-allowed; }
      button.danger { background: transparent; border: 1px solid #32323b; color: #c0c0c8; }
      button.danger:hover { background: #1f1f25; }
      .status { margin-top: 14px; font-size: 12px; padding: 10px 12px; border-radius: 6px; display: none; }
      .status.show { display: block; }
      .status.ok { background: #14322a; color: #86efac; border: 1px solid #1e5a47; }
      .status.err { background: #2b1a1d; color: #fca5a5; border: 1px solid #5a2a30; }
      .signed-out { text-align: center; padding: 20px 0; color: #a0a0a8; font-size: 13px; }
    </style>
  </head>
  <body>
    <div class="card">
      <div id="root">Loading…</div>
    </div>
    <script type="module" src="./index.ts"></script>
  </body>
</html>
